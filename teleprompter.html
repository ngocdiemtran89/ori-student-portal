<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ORI TOEIC — Teleprompter</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎓</text></svg>">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: #000;
      color: #fff;
      height: 100dvh;
      overflow: hidden;
    }

    /* ════════════════════════════════════════
       SCREEN 1: EDIT MODE
       ════════════════════════════════════════ */
    .edit-screen {
      display: flex;
      flex-direction: column;
      height: 100dvh;
    }

    .edit-screen.hidden { display: none; }

    /* Top bar */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      background: rgba(15,15,25,0.98);
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .brand-dot {
      width: 32px; height: 32px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border-radius: 9px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
      font-size: 0.85rem;
      box-shadow: 0 0 16px rgba(99,102,241,0.4);
    }

    .brand-text { font-weight: 700; font-size: 0.95rem; }
    .brand-text b { color: #818cf8; }

    /* Textarea */
    .edit-area {
      flex: 1;
      padding: 16px;
      overflow: hidden;
    }

    .edit-area textarea {
      width: 100%;
      height: 100%;
      background: rgba(255,255,255,0.04);
      border: 2px dashed rgba(255,255,255,0.12);
      border-radius: 16px;
      padding: 20px;
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-size: 1rem;
      line-height: 1.8;
      resize: none;
      outline: none;
      transition: border-color 0.3s;
    }

    .edit-area textarea:focus {
      border-color: rgba(99,102,241,0.5);
    }

    .edit-area textarea::placeholder {
      color: rgba(255,255,255,0.25);
    }

    /* Controls panel */
    .edit-controls {
      padding: 16px;
      background: rgba(15,15,25,0.98);
      border-top: 1px solid rgba(255,255,255,0.08);
    }

    .ctrl-group {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
    }

    .ctrl-group:last-of-type { margin-bottom: 16px; }

    .ctrl-icon {
      font-size: 1.1rem;
      width: 28px;
      text-align: center;
      flex-shrink: 0;
    }

    .ctrl-label {
      font-size: 0.78rem;
      font-weight: 600;
      color: rgba(255,255,255,0.45);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      min-width: 48px;
    }

    .ctrl-btn {
      width: 36px; height: 36px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.06);
      color: #fff;
      font-size: 1.1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
      -webkit-tap-highlight-color: transparent;
    }

    .ctrl-btn:active { transform: scale(0.9); background: rgba(99,102,241,0.3); }

    .ctrl-display {
      flex: 1;
      text-align: center;
      font-size: 1.1rem;
      font-weight: 700;
      color: #818cf8;
      font-variant-numeric: tabular-nums;
    }

    .ctrl-bar {
      flex: 1;
      height: 8px;
      background: rgba(255,255,255,0.08);
      border-radius: 4px;
      overflow: hidden;
      position: relative;
    }

    .ctrl-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #6366f1, #a78bfa);
      border-radius: 4px;
      transition: width 0.15s;
    }

    /* Start button */
    .btn-start {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 14px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-size: 1.05rem;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      box-shadow: 0 4px 20px rgba(99,102,241,0.4);
      transition: all 0.2s;
      -webkit-tap-highlight-color: transparent;
    }

    .btn-start:active { transform: scale(0.97); }
    .btn-start:disabled { opacity: 0.4; cursor: default; }

    .word-count {
      text-align: center;
      font-size: 0.75rem;
      color: rgba(255,255,255,0.3);
      margin-top: 10px;
    }

    /* ════════════════════════════════════════
       SCREEN 2: PLAY MODE
       ════════════════════════════════════════ */
    .play-screen {
      display: none;
      height: 100dvh;
      flex-direction: column;
      position: relative;
    }

    .play-screen.active { display: flex; }

    /* Gradient fades */
    .fade-top, .fade-bottom {
      position: absolute;
      left: 0; right: 0;
      z-index: 10;
      pointer-events: none;
    }

    .fade-top {
      top: 0;
      height: 30%;
      background: linear-gradient(to bottom, rgba(0,0,0,0.9) 0%, transparent 100%);
    }

    .fade-bottom {
      bottom: 0;
      height: 30%;
      background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, transparent 100%);
    }

    /* Center reading guide */
    .guide-line {
      position: absolute;
      top: 36%;
      left: 4%; right: 4%;
      height: 3px;
      background: #6366f1;
      opacity: 0.35;
      border-radius: 2px;
      z-index: 11;
      pointer-events: none;
      box-shadow: 0 0 20px rgba(99,102,241,0.3);
    }

    /* Scroll container */
    .scroll-wrap {
      flex: 1;
      overflow: hidden;
      position: relative;
    }

    .scroll-content {
      position: absolute;
      left: 0; right: 0;
      padding: 42vh 7% 90vh 7%;
    }

    .scroll-text {
      font-weight: 600;
      line-height: 1.75;
      letter-spacing: 0.015em;
      white-space: pre-wrap;
      word-break: break-word;
    }

    /* Play toolbar */
    .play-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
      background: rgba(10,10,20,0.95);
      border-top: 1px solid rgba(255,255,255,0.08);
      z-index: 20;
      flex-shrink: 0;
      gap: 6px;
    }

    .tb-btn {
      width: 42px; height: 42px;
      border-radius: 50%;
      border: none;
      background: rgba(255,255,255,0.08);
      color: #fff;
      font-size: 1.15rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
      -webkit-tap-highlight-color: transparent;
      flex-shrink: 0;
    }

    .tb-btn:active { transform: scale(0.88); }

    .tb-play {
      width: 54px; height: 54px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      font-size: 1.4rem;
      box-shadow: 0 4px 18px rgba(99,102,241,0.4);
    }

    .tb-info {
      font-size: 0.75rem;
      color: rgba(255,255,255,0.4);
      text-align: center;
      font-variant-numeric: tabular-nums;
      min-width: 38px;
    }

    .tb-info b {
      display: block;
      color: #818cf8;
      font-size: 0.85rem;
    }

    .tb-speed {
      display: flex;
      align-items: center;
      gap: 4px;
      background: rgba(255,255,255,0.06);
      border-radius: 20px;
      padding: 4px 6px;
    }

    .tb-speed .tb-btn {
      width: 32px; height: 32px;
      font-size: 0.95rem;
      background: transparent;
    }

    .tb-speed-val {
      font-size: 0.8rem;
      font-weight: 700;
      color: #818cf8;
      min-width: 24px;
      text-align: center;
    }

    /* ════════════════════════════════════════
       RESPONSIVE
       ════════════════════════════════════════ */
    @media (max-width: 400px) {
      .edit-area textarea { padding: 14px; font-size: 0.95rem; }
      .ctrl-label { min-width: 40px; font-size: 0.72rem; }
      .scroll-content { padding: 38vh 5% 80vh 5%; }
    }
  </style>
</head>
<body>

  <!-- ════ SCREEN 1: EDIT ════ -->
  <div class="edit-screen" id="screen-edit">
    <div class="topbar">
      <div class="brand">
        <div class="brand-dot">O</div>
        <div class="brand-text"><b>ORI</b> TOEIC</div>
      </div>
      <span style="font-size:0.75rem;color:rgba(255,255,255,0.3)">Teleprompter</span>
    </div>

    <div class="edit-area">
      <textarea id="input-text" placeholder="Dán nội dung script vào đây...&#10;&#10;Ví dụ:&#10;Xin chào các bạn! Hôm nay chúng ta sẽ học về TOEIC Listening Part 1..."></textarea>
    </div>

    <div class="edit-controls">
      <!-- Font size -->
      <div class="ctrl-group">
        <span class="ctrl-icon">🔤</span>
        <span class="ctrl-label">Chữ</span>
        <button class="ctrl-btn" id="size-down">−</button>
        <div class="ctrl-bar"><div class="ctrl-bar-fill" id="size-bar" style="width:40%"></div></div>
        <span class="ctrl-display" id="size-val">36px</span>
        <button class="ctrl-btn" id="size-up">+</button>
      </div>

      <!-- Speed -->
      <div class="ctrl-group">
        <span class="ctrl-icon">🚀</span>
        <span class="ctrl-label">Tốc</span>
        <button class="ctrl-btn" id="speed-down">−</button>
        <div class="ctrl-bar"><div class="ctrl-bar-fill" id="speed-bar" style="width:30%"></div></div>
        <span class="ctrl-display" id="speed-val">3</span>
        <button class="ctrl-btn" id="speed-up">+</button>
      </div>

      <button class="btn-start" id="btn-start">
        ▶️ Bắt Đầu Chạy Chữ
      </button>
      <div class="word-count" id="word-count">0 từ · ~0 phút đọc</div>
    </div>
  </div>

  <!-- ════ SCREEN 2: PLAY ════ -->
  <div class="play-screen" id="screen-play">
    <div class="fade-top"></div>
    <div class="fade-bottom"></div>
    <div class="guide-line"></div>

    <div class="scroll-wrap">
      <div class="scroll-content" id="scroll-content">
        <div class="scroll-text" id="scroll-text"></div>
      </div>
    </div>

    <div class="play-toolbar">
      <button class="tb-btn" id="tb-back" title="Quay lại sửa">✏️</button>

      <div class="tb-info">
        <span>⏱</span>
        <b id="play-timer">00:00</b>
      </div>

      <button class="tb-btn tb-play" id="tb-play">▶</button>

      <div class="tb-speed">
        <button class="tb-btn" id="tb-slow">−</button>
        <span class="tb-speed-val" id="tb-speed-val">3</span>
        <button class="tb-btn" id="tb-fast">+</button>
      </div>

      <button class="tb-btn" id="tb-reset" title="Về đầu">⏮</button>
    </div>
  </div>

  <script>
    // ── State ──
    let fontSize = 36;
    let speedLevel = 3; // 1-13
    const speedMap = [20, 40, 65, 90, 120, 160, 200, 250, 310, 380, 460, 550, 660];
    let isPlaying = false;
    let scrollPos = 0;
    let animFrame = null;
    let lastTime = null;
    let elapsed = 0;
    let timerRef = null;

    // ── Elements ──
    const screenEdit = document.getElementById('screen-edit');
    const screenPlay = document.getElementById('screen-play');
    const inputText  = document.getElementById('input-text');
    const scrollContent = document.getElementById('scroll-content');
    const scrollText = document.getElementById('scroll-text');
    const sizeVal    = document.getElementById('size-val');
    const sizeBar    = document.getElementById('size-bar');
    const speedVal   = document.getElementById('speed-val');
    const speedBar   = document.getElementById('speed-bar');
    const wordCount  = document.getElementById('word-count');
    const btnStart   = document.getElementById('btn-start');
    const tbPlay     = document.getElementById('tb-play');
    const tbSpeedVal = document.getElementById('tb-speed-val');
    const playTimer  = document.getElementById('play-timer');

    // ── Font size controls ──
    function updateSize(delta) {
      fontSize = Math.max(20, Math.min(80, fontSize + delta));
      sizeVal.textContent = fontSize + 'px';
      sizeBar.style.width = ((fontSize - 20) / 60 * 100) + '%';
    }

    document.getElementById('size-down').addEventListener('click', () => updateSize(-4));
    document.getElementById('size-up').addEventListener('click', () => updateSize(4));

    // ── Speed controls ──
    function updateSpeed(delta) {
      speedLevel = Math.max(1, Math.min(13, speedLevel + delta));
      speedVal.textContent = speedLevel;
      tbSpeedVal.textContent = speedLevel;
      speedBar.style.width = ((speedLevel - 1) / 12 * 100) + '%';
    }

    document.getElementById('speed-down').addEventListener('click', () => updateSpeed(-1));
    document.getElementById('speed-up').addEventListener('click', () => updateSpeed(1));
    document.getElementById('tb-slow').addEventListener('click', () => updateSpeed(-1));
    document.getElementById('tb-fast').addEventListener('click', () => updateSpeed(1));

    // ── Word count ──
    inputText.addEventListener('input', updateWordCount);

    function updateWordCount() {
      const text = inputText.value.trim();
      const words = text ? text.split(/\s+/).length : 0;
      const mins = Math.ceil(words / 140); // ~140 wpm reading speed
      wordCount.textContent = `${words} từ · ~${mins} phút đọc`;
      btnStart.disabled = words === 0;
    }

    // ── Start ──
    btnStart.addEventListener('click', () => {
      const text = inputText.value.trim();
      if (!text) return;

      // Save to localStorage
      localStorage.setItem('ori-tp-text', text);
      localStorage.setItem('ori-tp-size', fontSize);
      localStorage.setItem('ori-tp-speed', speedLevel);

      // Switch to play screen
      scrollText.textContent = text;
      scrollText.style.fontSize = fontSize + 'px';
      scrollPos = 0;
      scrollContent.style.transform = 'translateY(0)';
      elapsed = 0;
      playTimer.textContent = '00:00';

      screenEdit.classList.add('hidden');
      screenPlay.classList.add('active');

      // Auto-play after short delay
      setTimeout(() => play(), 600);
    });

    // ── Back to edit ──
    document.getElementById('tb-back').addEventListener('click', () => {
      pause();
      screenPlay.classList.remove('active');
      screenEdit.classList.remove('hidden');
    });

    // ── Play / Pause ──
    tbPlay.addEventListener('click', togglePlay);

    function togglePlay() {
      isPlaying ? pause() : play();
    }

    function play() {
      isPlaying = true;
      tbPlay.textContent = '⏸';
      lastTime = performance.now();
      animFrame = requestAnimationFrame(tick);
      timerRef = setInterval(() => {
        elapsed++;
        const m = String(Math.floor(elapsed / 60)).padStart(2, '0');
        const s = String(elapsed % 60).padStart(2, '0');
        playTimer.textContent = `${m}:${s}`;
      }, 1000);
    }

    function pause() {
      isPlaying = false;
      tbPlay.textContent = '▶';
      cancelAnimationFrame(animFrame);
      clearInterval(timerRef);
    }

    function tick(now) {
      if (!isPlaying) return;
      const dt = (now - lastTime) / 1000;
      lastTime = now;

      const px = speedMap[speedLevel - 1] * dt;
      scrollPos += px;

      const maxScroll = scrollContent.scrollHeight - window.innerHeight;
      if (scrollPos >= maxScroll) {
        scrollPos = maxScroll;
        scrollContent.style.transform = `translateY(-${scrollPos}px)`;
        pause();
        return;
      }

      scrollContent.style.transform = `translateY(-${scrollPos}px)`;
      animFrame = requestAnimationFrame(tick);
    }

    // ── Reset ──
    document.getElementById('tb-reset').addEventListener('click', () => {
      pause();
      scrollPos = 0;
      scrollContent.style.transform = 'translateY(0)';
      elapsed = 0;
      playTimer.textContent = '00:00';
    });

    // ── Keyboard ──
    document.addEventListener('keydown', (e) => {
      if (document.activeElement === inputText) return;
      if (e.code === 'Space') { e.preventDefault(); togglePlay(); }
      if (e.code === 'ArrowUp') { e.preventDefault(); updateSpeed(1); }
      if (e.code === 'ArrowDown') { e.preventDefault(); updateSpeed(-1); }
      if (e.code === 'Escape') {
        document.getElementById('tb-back').click();
      }
    });

    // ── Restore saved text ──
    const savedText = localStorage.getItem('ori-tp-text');
    const savedSize = localStorage.getItem('ori-tp-size');
    const savedSpeed = localStorage.getItem('ori-tp-speed');
    if (savedText) inputText.value = savedText;
    if (savedSize) { fontSize = parseInt(savedSize); updateSize(0); }
    if (savedSpeed) { speedLevel = parseInt(savedSpeed); updateSpeed(0); }
    updateWordCount();
  </script>
</body>
</html>
